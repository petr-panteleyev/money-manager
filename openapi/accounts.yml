openapi: "3.0.0"

info:
  title: Accounts
  version: 1.0.0

paths:
  /api/v1/accounts:
    get:
      tags:
        - "accounts, v1"
      summary: Получить все счета
      operationId: getAccounts
      responses:
        "200":
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountFlatDTO'
  /api/v1/accounts/stream:
    get:
      tags:
        - "accounts, v1"
      summary: Получить все счета в потоке
      operationId: getAccountsAsStream
      responses:
        "202":
          description: Успешный ответ
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /api/v1/accounts/{uuid}:
    get:
      tags:
        - "accounts, v1"
      summary: Получить счёт
      operationId: getAccountByUuid
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountFlatDTO'
        "404":
          description: Счёт не найден
    put:
      tags:
        - "accounts, v1"
      summary: Записать счёт
      operationId: putAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountFlatDTO'
      responses:
        "200":
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountFlatDTO'

components:
  schemas:
    AccountFlatDTO:
      type: object
      x-implements: ['org.panteleyev.money.dto.MoneyDTO']
      required:
        - uuid
        - name
        - comment
        - accountNumber
        - openingBalance
        - accountLimit
        - currencyRate
        - type
        - categoryUuid
        - enabled
        - interest
        - total
        - totalWaiting
        - created
        - modified
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        comment:
          type: string
        accountNumber:
          type: string
        openingBalance:
          type: number
        accountLimit:
          type: number
        currencyRate:
          type: number
        type:
          $ref: './categories.yml#/components/schemas/CategoryType'
        categoryUuid:
          type: string
          format: uuid
        currencyUuid:
          type: string
          format: uuid
        securityUuid:
          type: string
          format: uuid
        enabled:
          type: boolean
        interest:
          type: number
        closingDate:
          type: string
          format: date
        iconUuid:
          type: string
          format: uuid
        total:
          type: number
        totalWaiting:
          type: number
        created:
          type: integer
          format: int64
        modified:
          type: integer
          format: int64

