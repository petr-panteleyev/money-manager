openapi: "3.1.0"

info:
  title: Контакты
  version: 1.0.0

paths:
  /api/v1/contacts:
    get:
      tags:
        - "contacts, v1"
      summary: Получить все контакты
      operationId: getContacts
      responses:
        "200":
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactFlatDTO'

  /api/v1/contacts/{uuid}:
    get:
      tags:
        - "contacts, v1"
      summary: Получить контакт
      operationId: getContactByUuid
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactFlatDTO'
    put:
      tags:
        - "contacts, v1"
      summary: Записать контакт
      operationId: putContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactFlatDTO'
      responses:
        "200":
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactFlatDTO'
components:
  schemas:
    ContactType:
      type: string
      description: Тип контакта
      enum:
        - PERSONAL
        - CLIENT
        - SUPPLIER
        - EMPLOYEE
        - EMPLOYER
        - SERVICE
    ContactFlatDTO:
      type: object
      required:
        - uuid
        - name
        - type
        - phone
        - mobile
        - email
        - web
        - comment
        - street
        - city
        - country
        - zip
        - created
        - modified
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: '#/components/schemas/ContactType'
        comment:
          type: string
        phone:
          type: string
        mobile:
          type: string
        email:
          type: string
        web:
          type: string
        street:
          type: string
        city:
          type: string
        country:
          type: string
        zip:
          type: string
        iconUuid:
          type: string
          format: uuid
        created:
          type: integer
          format: int64
        modified:
          type: integer
          format: int64
